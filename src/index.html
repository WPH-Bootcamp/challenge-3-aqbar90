<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3 - Landing Page</title>
    <link href="./output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-white dark:bg-black">
      <!-- ========== NAVBAR ========== -->
      <section>
        <div
          class="w-98.5 h-16 flex-row border bottom-0.5 justify-between pt-6 pr-4 pb-6 pl-4"
        >
          <h1
            class="w-16.25 h-9 font-inter font-bold text-2xl leading-9 tracking-normal text-white"
          >
            Tech.
          </h1>
        </div>
      </section>
      <!-- ========== HERO SECTION ========== -->
      <section
        class="flex-row flex-wrap w-98.5 h-180 pt-10 pr-5 pb-10 pl-5 gap-4.5 bg-linear-to-b from-black to-blue-950"

        <div class="w-88.5 h-76 gap-6 flex-col">
          <div class="w-88.5 h-58 gap-4 flex-col">
            <h1
              class="w-88.5 h-24 font-inter font-bold text-4xl md:text-5xl lg:text-6xl leading-12 text-white"
            >
              Build with the <span class="italic">Future.</span>
            </h1>
            <p
              class="w-88.5 h-30 text-base font-normal leading-7.5 font-inter text-neutral-500"
            >
              From building sleek websites and mobile apps to integrating AI
              solutions, we help brands turn ideas into powerful digital
              experiences that connect, engage, and scale.
            </p>
          </div>
          <div
            class="flex-row w-88.5 h-12 border rounded-full gap-1 p-2 bg-blue-600 text-center"
          >
            <button
              class="w-15.75 h-7 font-semibold font-inter text-sm leading-7 text-white"
            >
              Let’s Talk
            </button>
          </div>
        </div>
        <div class="w-72.21 h-104.94">
          <div class="w-77.08 h-104.79">
            <img src="../assets/images/hand.png" alt="holder Handphone" />
          </div>
        </div>
      </section>
      <!-- ========== FOOTER ========== -->
    </div>
